services:
  - type: web
    plan: free
    name: Tomris
    env: python
    buildCommand: pip install -U -r requirements.txt
    startCommand: python3 server.py
    repo: https://github.com/ixelizm/TomrisUserBot
    branch: master
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: STRING_SESSION
        sync: false

    autoDeploy: false
